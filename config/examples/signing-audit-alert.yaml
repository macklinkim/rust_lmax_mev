# P6B-C v0.3 D-C5 + P6B-CD v0.4 D-CD9 narrowing.
# Sample Prometheus Alertmanager rules for the Section 2.5 candidate
# #4 Operator-Visible Signing Audit Log control.
#
# The workspace emits:
#   - counter production_signer_audit_attempts_total{outcome}
#     Outcomes at P6B-CD close (7-label set):
#       not_configured              (no live KMS attached)
#       address_mismatch            (failure: bundle from-address invariant)
#       invalid_bundle_tx           (failure: fee-field invariant)
#       kms_sign_failed             (failure: KMS Sign call error)
#       invalid_signature_bytes     (failure: DER parse error)
#       signature_recovery_failed   (failure: trial-recovery did not match pubkey)
#       ok                          (success)
#   - gauge   production_signer_audit_alert_threshold_max_attempts_per_minute
#   - gauge   production_signer_audit_alert_threshold_max_failed_per_minute
#
# The threshold gauges carry the operator-configured values from the
# workspace TOML `[relay.signing_audit_alert]` section. The rules below
# reference the gauges (NOT hardcoded scalar thresholds) so the alert
# ceiling is managed by the workspace config, not by editing this YAML.
#
# Codex review notes:
#   - `> on() <gauge>` requires both sides of the comparison to have an
#     empty label set. The counter rate is therefore wrapped in `sum(...)`
#     to drop the `outcome` label before the comparison.
#   - Gauge value `0` means the operator left the threshold DISABLED.
#     Each rule below is gated on `<threshold_gauge> > 0` so the rule
#     evaluates to no samples when the threshold is disabled, even if
#     the observed signing rate is positive. (Without the gate, any
#     positive rate would compare strictly greater than 0 and fire the
#     alert -- contradicting the "0 = disabled" contract documented on
#     `RelayConfig::signing_audit_alert` in `crates/config/src/lib.rs`
#     and the `production-signer.md` Section 2.5 candidate #4 contract.)
#
# This file is illustrative. Operators copy + adapt to their own
# Alertmanager / Prometheus deployment. The workspace ships only the
# metric source and the configurable thresholds; the dashboard
# rendering + alert routing are operator infrastructure.

groups:
  - name: production-signer-audit
    rules:
      - alert: SigningAttemptRateHigh
        expr: |
          (
            (sum(rate(production_signer_audit_attempts_total[1m])) * 60)
            > on() production_signer_audit_alert_threshold_max_attempts_per_minute
          )
          and on() (production_signer_audit_alert_threshold_max_attempts_per_minute > 0)
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Signing attempt rate exceeded configured threshold (Section 2.5 candidate #4)"
          description: "production_signer_audit_attempts_total per-minute rate exceeded the operator-configured max_attempts_per_minute gauge. Rule is gated on the gauge being > 0; a gauge value of 0 means the operator disabled this alert at the workspace TOML config level."

      - alert: SigningFailureRateHigh
        expr: |
          (
            (sum(rate(production_signer_audit_attempts_total{outcome=~"address_mismatch|invalid_bundle_tx|kms_sign_failed|invalid_signature_bytes|signature_recovery_failed"}[1m])) * 60)
            > on() production_signer_audit_alert_threshold_max_failed_per_minute
          )
          and on() (production_signer_audit_alert_threshold_max_failed_per_minute > 0)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Signing failure rate exceeded configured threshold (Section 2.5 candidate #4)"
          description: "Sum-of-failure-outcome (address_mismatch, invalid_bundle_tx, kms_sign_failed, invalid_signature_bytes, signature_recovery_failed) signing-attempt rate exceeded the operator-configured max_failed_per_minute gauge. The ok outcome is EXCLUDED from this rule by construction; not_configured is excluded as a fail-closed no-op state. Rule is gated on the gauge being > 0; a gauge value of 0 means the operator disabled this alert."
