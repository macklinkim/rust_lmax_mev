# Dev sample config for the Phase 2 LMAX MEV engine.
# Loopback Geth assumed; pretty logging at debug level for dev iteration.
# Operator runs against a local archive-mode-optional Geth on
# 127.0.0.1:8545 / 8546 plus the noted public fallback (replace API key).

[node]
geth_ws_url = "ws://127.0.0.1:8546"
geth_http_url = "http://127.0.0.1:8545"

[[node.fallback_rpc]]
url = "https://eth-mainnet.g.alchemy.com/v2/REPLACE_ME"
label = "alchemy-dev"

# Phase 4 P4-A archive node RPC (ADR-007). Optional; defaults to None
# (fail-closed). Uncomment + supply a real archive endpoint to enable
# Phase 4 archive-mode reads (eth_get_proof / eth_get_storage_at /
# eth_get_code).
# [node.archive_rpc]
# url = "https://eth-archive.g.alchemy.com/v2/REPLACE_ME"
# label = "alchemy-archive-dev"

[observability]
prometheus_listen = "127.0.0.1:9090"
log_filter = "debug"
log_format = "pretty"

[journal]
file_journal_path = "./.dev/journal.log"
rocksdb_snapshot_path = "./.dev/snapshot"
ingress_journal_path = "./.dev/ingress.log"
state_journal_path = "./.dev/state.log"

[bus]
capacity = 1024

[ingress.tokens]
weth = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
usdc = "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"

[ingress]
watched_addresses = [
    "0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc",
    "0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640",
]

[[state.pools]]
kind = "uniswap_v2"
address = "0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc"

[[state.pools]]
kind = "uniswap_v3_fee_005"
address = "0x88e6A0c2dDD26FEEb64F039a2c41296FcB3f5640"
