# cargo-deny configuration. Schema v2 per cargo-deny 0.16+
# (https://github.com/EmbarkStudios/cargo-deny/pull/611). The Phase 1
# CI gate is `cargo deny check` per ADR-008.

[advisories]
version = 2
ignore = [
    # bincode 1.3 is "unmaintained" per RUSTSEC-2025-0141 (project-team
    # cessation). ADR-004 deliberately chose bincode 1.x as the cold-path
    # serializer for Phase 1; the 1.3 branch is feature-complete for our
    # use case. Migration to wincode/postcard/bitcode is deferred to a
    # future ADR revision.
    "RUSTSEC-2025-0141",
    # `lru = "0.12"` IterMut Stacked-Borrows unsoundness per
    # RUSTSEC-2026-0002. We use only `LruCache::put` for dedup
    # bookkeeping (no IterMut access) so the unsoundness path is not
    # exercised. Revisit when lru 0.13+ ships a fix.
    "RUSTSEC-2026-0002",
    # `paste` unmaintained per RUSTSEC-2024-0436. Pulled transitively
    # by alloy 0.8's macro stack; out of our control until alloy
    # migrates.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0098 / 0099 / 0104: three rustls-webpki 0.101.7
    # advisories pulled transitively via aws-smithy-http-client 1.1.12
    # -> rustls 0.21.12 -> rustls-webpki 0.101.7 (only the AWS SDK
    # chain is still on the old rustls stack; the workspace ALSO
    # pulls rustls-webpki 0.103.13 via reqwest + hyper-rustls 0.27.9,
    # which is non-vulnerable). Reachability analysis:
    # - 2026-0098 (URI name constraints accepted): rustls-webpki does
    #   NOT expose any URI assertion API per the advisory text; no
    #   caller in this workspace can reach the bug.
    # - 2026-0099 (wildcard cert under DNS name constraint): would
    #   require the AWS KMS endpoint to be served by a cert with a
    #   wildcard SAN under a permitted-subtree name constraint; AWS
    #   PCA misissuance is outside the operator threat model.
    # - 2026-0104 (CRL parsing panic): aws-sdk-kms's HTTPS path does
    #   not parse user-controlled CRLs (uses OCSP-or-none); the
    #   panic is unreachable in this code path.
    # Default-runtime fail-closed posture additionally shields the
    # codepath: wire_phase4 injects DisabledSigner, so the
    # ProductionSigner -> aws-sdk-kms HTTPS pipeline is never
    # executed unless an operator explicitly wires the production
    # signer.
    # Revisit trigger: when aws-sdk-kms / aws-smithy-http-client
    # publishes a release that uses rustls-webpki >= 0.103.12, bump
    # the dep and REMOVE these three ignores in the same commit.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
# Skip license checks for internal `publish = false` crates so the
# workspace's own crates do not need a license field. Without this, every
# `crates/*/Cargo.toml` would need `license = "..."` even though they are
# not published.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # Phase 2 P2-A alloy transitives:
    "Unlicense",   # async_io_stream, pharos, ws_stream_wasm — public-domain equivalent
    "CC0-1.0",     # tiny-keccak — public-domain equivalent
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path-only intra-workspace deps look like wildcards to cargo-deny;
# allow them since they resolve to specific local crates at build time.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
